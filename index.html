<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT App Marketing</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #0ea5e9 0%, #0f172a 45%, #020617 100%);
      }
      main {
        width: min(90vw, 760px);
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 16px;
        padding: 2rem;
        color: #e2e8f0;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.4);
      }
      h1 {
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        margin: 0 0 0.5rem;
      }
      p {
        line-height: 1.6;
        margin: 0.7rem 0;
      }
      code {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 6px;
        padding: 0.15rem 0.4rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deploy-ul este activ ✅</h1>
      <p>
        Dacă vedeai <code>404: NOT_FOUND</code>, problema era că proiectul nu avea niciun fișier
        public care să fie servit la ruta rădăcină.
      </p>
      <p>
        Am adăugat această pagină <code>index.html</code>, iar acum răspunsul pentru <code>/</code>
        ar trebui să fie 200.
      </p>
      <p>Poți redeploy-ui proiectul pentru a aplica schimbarea.</p>
    </main>
  </body>
</html>
